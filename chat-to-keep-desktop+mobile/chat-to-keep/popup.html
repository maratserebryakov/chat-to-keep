<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
    button {
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    #saveBtn { background: #4285f4; }
    #saveBtn:hover { background: #3367d6; }
    #saveBtn:disabled { background: #ccc; cursor: wait; }
    #keepBtn {
      background: #fbbc04;
      color: #333;
      display: none;
    }
    #keepBtn:hover { background: #f9a825; }
    .setup-link {
      font-size: 11px;
      color: #666;
      text-decoration: none;
      display: block;
      margin-top: 4px;
      margin-bottom: 8px;
    }
    .setup-link:hover { color: #4285f4; }
    #linkBox {
      display: none;
      padding: 8px;
      margin-bottom: 8px;
      border: 2px solid #4285f4;
      border-radius: 6px;
      font-size: 12px;
      background: #f0f4ff;
      word-break: break-all;
    }
    #status {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
    }
    .ok { color: #1e7e34; }
    .err { color: #c62828; }
  </style>
</head>
<body>
  <h2>Chat to Keep</h2>

  <label style="font-size:12px;color:#666;">GitHub Token:</label>
  <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
  <a class="setup-link"
     href="https://github.com/settings/tokens/new?scopes=gist&description=ChatToKeep"
     target="_blank">Create token (scope: gist)</a>

  <button id="saveBtn">1. Save chat to Gist</button>
  <div id="linkBox"></div>
  <button id="keepBtn">2. Open Google Keep (then Ctrl+V)</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
